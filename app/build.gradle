plugins {
    id 'com.android.application'
}

android {
    namespace 'com.osama.bydyoutubebridge'
    compileSdk 35

    defaultConfig {
        applicationId 'com.osama.bydyoutubebridge'
        minSdk 26
        targetSdk 35
        versionCode 3
        versionName '0.3'
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}
